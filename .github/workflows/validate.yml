name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Claude Code CLI (best effort — validate-repo degrades with a warning if absent)
        continue-on-error: true
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate repository
        env:
          ALLOW_MISSING_CLAUDE_VALIDATE: '1'
        run: bash common/tests/validate-repo.sh
